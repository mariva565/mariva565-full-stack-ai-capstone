<svg xmlns="http://www.w3.org/2000/svg" width="980" height="178" viewBox="0 0 980 178" role="img" aria-labelledby="title desc">
  <title id="title">StudyHub v2 comic-style study quest banner</title>
  <desc id="desc">A polished comic speech-bubble banner for the StudyHub full-stack AI LMS capstone.</desc>
  <defs>
    <linearGradient id="bubbleFill" x1="132" x2="884" y1="42" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f23fc2"/>
      <stop offset="0.34" stop-color="#8b5cf6"/>
      <stop offset="0.68" stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#17d5d1"/>
    </linearGradient>
    <radialGradient id="burstFill" cx="48%" cy="48%" r="72%">
      <stop offset="0" stop-color="#fff6a8"/>
      <stop offset="0.54" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f7a3bd"/>
    </radialGradient>
    <linearGradient id="bubbleShine" x1="168" x2="820" y1="44" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="0.28" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="panelShadow" x="-8%" y="-26%" width="116%" height="158%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
    <filter id="inkLift" x="-5%" y="-32%" width="110%" height="168%">
      <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="#111827" flood-opacity="0.65"/>
    </filter>
    <pattern id="benDay" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#ffffff" opacity="0.22"/>
      <circle cx="14" cy="14" r="1.25" fill="#ffffff" opacity="0.13"/>
    </pattern>
    <pattern id="fineLines" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 15 L15 0" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="980" height="178" fill="none"/>

  <g opacity="0.96">
    <path d="M80 44 L117 19 L143 43 L185 22 L175 62 L229 67 L187 94 L211 134 L158 121 L140 169 L113 126 L68 153 L77 107 L25 103 L67 78 L42 40 Z" fill="url(#burstFill)" stroke="#111827" stroke-width="5" stroke-linejoin="round"/>
    <path d="M86 53 L116 33 L141 55 L171 40 L164 72 L205 76 L173 96 L191 123 L153 114 L139 151 L116 117 L82 136 L89 101 L51 98 L81 79 L62 54 Z" fill="#fff7cc" opacity="0.6"/>
