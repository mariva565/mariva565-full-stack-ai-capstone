    <path d="M178 42 H834 C864 42 887 63 887 90 C887 117 864 138 834 138 H360 L345 145 L350 138 H178 C148 138 125 117 125 90 C125 63 148 42 178 42 Z" fill="url(#bubbleFill)"/>
    <path d="M178 42 H834 C864 42 887 63 887 90 C887 117 864 138 834 138 H360 L345 145 L350 138 H178 C148 138 125 117 125 90 C125 63 148 42 178 42 Z" fill="url(#benDay)"/>
    <path d="M178 42 H834 C864 42 887 63 887 90 C887 117 864 138 834 138 H360 L345 145 L350 138 H178 C148 138 125 117 125 90 C125 63 148 42 178 42 Z" fill="url(#fineLines)"/>
    <path d="M160 55 C298 36 520 39 662 57 C750 68 824 58 875 50 C865 45 852 42 834 42 H178 C171 42 165 43 159 45 Z" fill="url(#bubbleShine)"/>
    <path d="M178 42 H834 C864 42 887 63 887 90" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.45"/>
