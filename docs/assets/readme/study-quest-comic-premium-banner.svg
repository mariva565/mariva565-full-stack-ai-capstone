  <g fill="#ffffff">
    <circle cx="144" cy="49" r="3" opacity="0.84"/>
    <circle cx="921" cy="120" r="2.8" opacity="0.78"/>
    <circle cx="61" cy="132" r="2.6" opacity="0.74"/>
    <circle cx="910" cy="38" r="2" opacity="0.62"/>
