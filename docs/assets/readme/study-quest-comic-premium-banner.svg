  <g stroke="#ffffff" stroke-linecap="round" opacity="0.46">
    <path d="M180 65 H300" stroke-width="4"/>
    <path d="M158 89 H286" stroke-width="3"/>
    <path d="M704 65 H858" stroke-width="4"/>
    <path d="M728 113 H846" stroke-width="3"/>
  </g>

  <text x="526" y="83" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="43" letter-spacing="1.15" fill="#ffffff" stroke="#111827" stroke-width="4.2" paint-order="stroke fill" filter="url(#inkLift)">
