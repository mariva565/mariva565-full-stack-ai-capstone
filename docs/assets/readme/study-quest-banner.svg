<svg xmlns="http://www.w3.org/2000/svg" width="980" height="180" viewBox="0 0 980 180" role="img" aria-labelledby="title desc">
  <title id="title">StudyHub v2 study quest banner</title>
  <desc id="desc">Comic-style banner for the StudyHub full-stack AI learning platform capstone.</desc>
  <defs>
    <linearGradient id="panelGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff3dc8"/>
      <stop offset="38%" stop-color="#7c3aed"/>
      <stop offset="72%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="burstGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="44%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="7" flood-color="#111827" flood-opacity="0.22"/>
    </filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#ffffff" opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="980" height="180" fill="none"/>

  <g opacity="0.9">
    <path d="M55 28 L4 54 L58 64 L16 104 L82 91 L61 151 L126 108 L145 171 L174 110 L234 153 L215 92 L281 103 L237 64 L291 51 L235 28 L260 0 L190 22 L174 0 L145 22 L96 2 L112 30 Z" fill="url(#burstGradient)" stroke="#111827" stroke-width="5"/>
    <text x="145" y="78" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="34" fill="#111827" transform="rotate(-8 145 78)">LEVEL</text>
    <text x="145" y="118" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="45" fill="#111827" transform="rotate(-8 145 118)">UP!</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M176 26 H884 C917 26 944 52 944 84 C944 116 918 142 884 142 H374 L326 170 L338 142 H176 C143 142 116 116 116 84 C116 52 143 26 176 26 Z" fill="#ffffff" stroke="#111827" stroke-width="6"/>
    <path d="M184 37 H876 C904 37 927 58 927 84 C927 110 904 131 876 131 H355 L342 139 L346 131 H184 C156 131 133 110 133 84 C133 58 156 37 184 37 Z" fill="url(#panelGradient)" opacity="0.95"/>
    <path d="M184 37 H876 C904 37 927 58 927 84 C927 110 904 131 876 131 H355 L342 139 L346 131 H184 C156 131 133 110 133 84 C133 58 156 37 184 37 Z" fill="url(#dots)" opacity="0.72"/>
  </g>

  <g opacity="0.42" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <path d="M180 54 H286"/>
    <path d="M146 82 H272"/>
    <path d="M184 112 H312"/>
    <path d="M738 52 H902"/>
    <path d="M772 82 H918"/>
    <path d="M708 112 H884"/>
  </g>

  <text x="530" y="78" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="44" letter-spacing="1.4" fill="#ffffff" stroke="#111827" stroke-width="4" paint-order="stroke fill">
    STUDY QUEST MODE: ON
  </text>
  <text x="530" y="113" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800" fill="#ffffff" stroke="#111827" stroke-width="2" paint-order="stroke fill">
    Full-stack AI LMS capstone | Next.js Web | Expo Mobile | Neon + Drizzle
  </text>

  <g fill="#ffffff" stroke="#111827" stroke-width="4">
    <path d="M902 18 L911 36 L930 38 L916 51 L920 70 L902 61 L884 70 L888 51 L874 38 L893 36 Z"/>
    <path d="M81 117 L89 132 L106 134 L94 146 L97 163 L81 155 L65 163 L68 146 L56 134 L73 132 Z"/>
