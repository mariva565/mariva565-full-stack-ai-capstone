  <rect x="320" y="310" width="262" height="174" rx="16" fill="#FFFFFF" fill-opacity="0.92"/>
  <rect x="602" y="310" width="262" height="174" rx="16" fill="#FFFFFF" fill-opacity="0.92"/>

  <g opacity="0.2">
    <rect x="58" y="182" width="216" height="12" rx="6" fill="#64748B"/>
    <rect x="58" y="208" width="180" height="12" rx="6" fill="#64748B"/>
