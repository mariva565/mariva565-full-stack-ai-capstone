<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE7BA">
        <animate attributeName="stop-color" values="#FFE7BA;#FFD4E5;#D8F7FF;#FFE7BA" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#FFD4E5">
        <animate attributeName="stop-color" values="#FFD4E5;#D8F7FF;#FFE7BA;#FFD4E5" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#D8F7FF">
        <animate attributeName="stop-color" values="#D8F7FF;#FFE7BA;#FFD4E5;#D8F7FF" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" rx="22" fill="url(#bg)"/>
  <rect x="36" y="32" width="828" height="54" rx="14" fill="#1E293B"/>
  <circle cx="66" cy="59" r="9" fill="#FF6B6B"/>
  <circle cx="93" cy="59" r="9" fill="#FFD166"/>
  <circle cx="120" cy="59" r="9" fill="#06D6A0"/>
  <rect x="154" y="46" width="290" height="26" rx="8" fill="#334155"/>
